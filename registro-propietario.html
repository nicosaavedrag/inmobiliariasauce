<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Propietario - Sauce Inmobiliaria</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header-principal">
        <div class="logo">
            <a href="index.html" style="color: white; text-decoration: none;"><h1>Sauce Inmobiliaria</h1></a>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="registro-gestor.html">Registrar Gestor</a></li>
            </ul>
        </nav>
    </header>

    <main class="contenedor-formulario">
        <section class="card-form">
            <h2>Registrarme como PROPIETARIO</h2>
            <form action="confirmacion-registro.html" method="POST">
                <div class="grupo-input">
                    <label for="rut">Rut:</label>
                    <input type="text" id="rut" name="rut" required>
                </div>
                <div class="grupo-input">
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>
                <div class="grupo-input">
                    <label for="fecha_nac">Fecha de Nacimiento:</label>
                    <input type="date" id="fecha_nac" name="fecha_nac" required>
                </div>
                <div class="grupo-input">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="grupo-input">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="grupo-input">
                    <label for="sexo">Sexo:</label>
                    <select id="sexo" name="sexo">
                        <option value="f">Femenino</option>
                        <option value="m">Masculino</option>
                        <option value="o">Otro</option>
                    </select>
                </div>
                <div class="grupo-input">
                    <label for="telefono">Teléfono Móvil:</label>
                    <input type="tel" id="telefono" name="telefono" required>
                </div>
                <div class="grupo-input">
                    <label for="n_bienes">N° de propiedad (Bienes Raíces):</label>
                    <input type="text" id="n_bienes" name="n_bienes" required>
                </div>
                <button type="submit" class="btn-primario">Registrar Propietario</button>
            </form>
        </section>
    </main>
</body>
</html>
