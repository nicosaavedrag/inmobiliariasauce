<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Gestor Freelance - Sauce Inmobiliaria</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header-principal">
        <div class="logo">
            <a href="index.html" style="color: white; text-decoration: none;"><h1>Sauce Inmobiliaria</h1></a>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="registro-propietario.html">Registrar Propietario</a></li>
            </ul>
        </nav>
    </header>

    <main class="contenedor-formulario">
        <section class="card-form">
            <h2>Registrarme como GESTOR INMOBILIARIO FREE</h2>
            <p>Ingresa tus antecedentes para postular y comenzar a generar ingresos adicionales.</p>
            
            <form action="postulacion-exitosa.html" method="POST" enctype="multipart/form-data">
                <div class="grupo-input">
                    <label for="rut">RUT:</label>
                    <input type="text" id="rut" name="rut" placeholder="12.345.678-9" required>
                </div>

                <div class="grupo-input">
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>

                <div class="grupo-input">
                    <label for="fecha_nac">Fecha de Nacimiento:</label>
                    <input type="date" id="fecha_nac" name="fecha_nac" required>
                </div>

                <div class="grupo-input">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="grupo-input">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="grupo-input">
                    <label for="sexo">Sexo:</label>
                    <select id="sexo" name="sexo">
                        <option value="femenino">Femenino</option>
                        <option value="masculino">Masculino</option>
                        <option value="otro">Otro / Prefiero no decir</option>
                    </select>
                </div>

                <div class="grupo-input">
                    <label for="telefono">Teléfono Móvil:</label>
                    <input type="tel" id="telefono" name="telefono" placeholder="+56 9 1234 5678" required>
                </div>

                <div class="grupo-input">
                    <label for="certificado">Certificado de Antecedentes:</label>
                    <input type="file" id="certificado" name="certificado" accept=".pdf" required>
                </div>

                <button type="submit" class="btn-primario">Enviar Postulación</button>
            </form>
        </section>
    </main>
</body>
</html>
