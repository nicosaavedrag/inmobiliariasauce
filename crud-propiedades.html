<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CRUD Propiedades - Sauce Inmobiliaria</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-dashboard">
    <header class="header-principal">
        <h1>Sauce - Registro de Propiedades</h1>
        <a href="dashboard.html" class="btn-ver-mas">Volver al Panel</a>
    </header>

    <main class="dashboard-main">
        <section class="card-form form-ancho">
            <h3>Nueva Publicación de Inmueble</h3>
            <form class="grid-form">
                <div class="grupo-input">
                    <label>Tipo de Propiedad:</label>
                    <select><option>Casa</option><option>Departamento</option><option>Terreno</option></select>
                </div>
                <div class="grupo-input">
                    <label>Precio UF:</label>
                    <input type="number" step="0.01">
                </div>
                <div class="grupo-input">
                    <label>Precio $:</label>
                    <input type="number">
                </div>
                <div class="grupo-input">
                    <label>Dormitorios:</label>
                    <input type="number">
                </div>
                <div class="grupo-input">
                    <label>Baños:</label>
                    <input type="number">
                </div>
                <div class="grupo-input">
                    <label>Área Construida (m2):</label>
                    <input type="number">
                </div>
                <div class="grupo-input full-width">
                    <label>Descripción:</label>
                    <textarea rows="4"></textarea>
                </div>
                <div class="opciones-check full-width">
                    <label><input type="checkbox"> Bodega</label>
                    <label><input type="checkbox"> Estacionamiento</label>
                    <label><input type="checkbox"> Piscina</label>
                    <label><input type="checkbox"> Cocina amoblada</label>
                    <label><input type="checkbox"> Antejardín</label>
                    <label><input type="checkbox"> Patio Trasero</label>
                </div>
                <div class="grupo-input full-width">
                    <label>Fotografías (Máximo 9):</label>
                    <input type="file" multiple accept="image/*">
                </div>
                <div class="grupo-input full-width">
                    <label>Ubicación (Google Maps API):</label>
                    <input type="text" placeholder="Pegar enlace o coordenadas">
                </div>
                <button type="submit" class="btn-primario">Publicar Propiedad</button>
            </form>
        </section>
    </main>
</body>
</html>
