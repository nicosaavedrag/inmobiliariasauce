<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Sauce Inmobiliaria</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header-principal">
        <div class="logo">
            <a href="index.html" style="color: white; text-decoration: none;"><h1>Sauce Inmobiliaria</h1></a>
        </div>
        <nav aria-label="Navegación secundaria">
            <ul class="nav-links">
                <li><a href="index.html">Volver al Inicio</a></li>
            </ul>
        </nav>
    </header>

    <main class="contenedor-formulario">
        <section class="card-form">
            <h2>¿Olvidaste tu contraseña?</h2>
            <p>Ingresa tu correo electrónico registrado y te enviaremos las instrucciones para restablecer tu cuenta.</p>
            
            <form action="mensaje-envio.html" method="GET">
                <div class="grupo-input">
                    <label for="email-recuperar">Correo Electrónico:</label>
                    <input type="email" id="email-recuperar" name="email" placeholder="ejemplo@correo.cl" required aria-required="true">
                </div>

                <button type="submit" class="btn-primario">Enviar Instrucciones</button>
                
                <div class="enlaces-ayuda">
                    <a href="index.html" class="link-secundario">Regresar al Login</a>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Sauce Inmobiliaria - Gestión de Acceso</p>
    </footer>
</body>
</html>
